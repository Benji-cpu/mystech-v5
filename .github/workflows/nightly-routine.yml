# Nightly call to /api/cron/nightly-routine.
#
# Runs at 19:22 UTC daily, which is 03:22 Bali time (WITA, UTC+8). Staggered
# +5min from Ubudian's 03:17 so digests arrive separately. Off-minute (22)
# avoids the global :00 fleet pile-up.
#
# Why GitHub Actions and not Vercel Cron: Hobby plan caps cron jobs at 2/day
# and doesn't honour timezones. GitHub Actions runs free, supports manual
# triggers via workflow_dispatch (handy for verification), and lets the
# cron route stay separate from production deployment slots.
#
# Setup: Add CRON_SECRET as a repo secret (matching the same value Vercel
# already has on the project). Set ADMIN_EMAIL on the Vercel project so the
# digest has a destination.

name: nightly-routine

on:
  schedule:
    - cron: "22 19 * * *"
  workflow_dispatch: {}

jobs:
  call-nightly-routine:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/cron/nightly-routine with digest=true
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is not set on this repository"
            exit 1
          fi

          response=$(mktemp)
          status=$(curl -sS -w "%{http_code}" -o "$response" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://mystech-v5.vercel.app/api/cron/nightly-routine?digest=true")

          echo "HTTP $status"
          cat "$response"
          echo

          if [ "$status" != "200" ]; then
            echo "::error::Nightly routine endpoint returned $status"
            exit 1
          fi

          {
            echo "## Nightly routine"
            echo "\`\`\`json"
            cat "$response" | head -c 4000
            echo
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
