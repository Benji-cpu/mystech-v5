<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sacred Seal Break — MysTech Mock Lab</title>
  <link rel="stylesheet" href="../../shared/base.css">
  <link rel="stylesheet" href="../../shared/controls.css">
  <style>
    /* ============================================
       Mock 4: Sacred Seal Break
       Ritualistic/Dramatic card reveal with
       SVG seal drawing + canvas shatter + CSS shockwave
       ============================================ */

    /* --- Control defaults (overridden by MockControls) --- */
    :root {
      --ctrl-seal-style: simple;
      --ctrl-crack-pattern: radial;
      --ctrl-shatter-force: 5;
      --ctrl-fragments: 25;
      --ctrl-shockwave: 0.7;
      --ctrl-seal-speed: 15s;
      --ctrl-dust-fade: 1.5s;
      --ctrl-delay: 1.5s;
    }

    /* --- Page layout --- */
    .demo-area {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding-bottom: 6rem;
      position: relative;
      overflow: hidden;
    }

    /* Subtle radial gradient background atmosphere */
    .demo-area::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 40%, rgba(74, 20, 140, 0.15) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 30% 60%, rgba(124, 77, 255, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 70% 70%, rgba(201, 169, 78, 0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* --- Spread labels --- */
    .spread-container {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 2.5rem;
      position: relative;
      z-index: 1;
    }

    .card-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .card-slot__label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-secondary);
      opacity: 0.7;
    }

    /* --- Card wrapper (contains card + seal + shockwave) --- */
    .card-wrapper {
      position: relative;
      width: 120px;
      aspect-ratio: 2 / 3;
    }

    /* --- The revealed card underneath --- */
    .oracle-card-inner {
      width: 100%;
      height: 100%;
      border-radius: 0.625rem;
      overflow: hidden;
      border: 1px solid var(--border-subtle);
      opacity: 0;
      transform: scale(0.92);
      transition: opacity 0.6s ease, transform 0.6s var(--ease-out-expo);
      position: relative;
      z-index: 1;
    }

    .oracle-card-inner.is-revealed {
      opacity: 1;
      transform: scale(1);
    }

    /* Card art gradient */
    .card-art {
      position: absolute;
      inset: 0;
      border-radius: 0.625rem;
    }

    .card-art--wanderer {
      background: linear-gradient(135deg, #1a0530 0%, #2d1b69 30%, #4a148c 60%, #7c4dff 100%);
    }
    .card-art--mirror {
      background: linear-gradient(135deg, #0a0118 0%, #1a237e 30%, #283593 60%, #5c6bc0 100%);
    }
    .card-art--flame {
      background: linear-gradient(135deg, #1a0530 0%, #4a148c 20%, #8a2387 50%, #c9a94e 100%);
    }

    /* Card title overlay */
    .card-title {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.75rem 0.5rem;
      text-align: center;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold-bright);
      background: linear-gradient(to top, rgba(10, 1, 24, 0.9) 0%, transparent 100%);
      text-shadow: 0 0 8px rgba(201, 169, 78, 0.5);
    }

    /* Card inner glow on reveal */
    .oracle-card-inner.is-revealed .card-art::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 0.625rem;
      box-shadow: inset 0 0 30px rgba(201, 169, 78, 0.15);
      pointer-events: none;
    }

    /* --- SVG Seal overlay --- */
    .seal-svg {
      position: absolute;
      inset: -10%;
      width: 120%;
      height: 120%;
      z-index: 5;
      pointer-events: none;
      filter: drop-shadow(0 0 8px rgba(201, 169, 78, 0.4));
    }

    .seal-svg.is-shattered {
      display: none;
    }

    /* Seal drawing animation — stroke-dashoffset */
    .seal-path {
      fill: none;
      stroke: var(--gold);
      stroke-width: 1;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.85;
    }

    .seal-path--outer {
      stroke-width: 1.2;
      opacity: 1;
    }

    .seal-path--inner {
      stroke-width: 0.8;
      opacity: 0.6;
    }

    .seal-path--dots {
      fill: var(--gold);
      stroke: none;
      opacity: 0.7;
    }

    /* Drawing animation class */
    .seal-path.is-drawing {
      animation: seal-draw var(--ctrl-seal-speed) linear infinite;
    }

    @keyframes seal-draw {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -1000; }
    }

    /* Pulse glow on the seal */
    .seal-pulse {
      animation: seal-glow 2.5s ease-in-out infinite;
    }

    @keyframes seal-glow {
      0%, 100% {
        filter: drop-shadow(0 0 6px rgba(201, 169, 78, 0.3));
        opacity: 1;
      }
      50% {
        filter: drop-shadow(0 0 16px rgba(201, 169, 78, 0.6))
               drop-shadow(0 0 24px rgba(226, 201, 106, 0.3));
        opacity: 0.9;
      }
    }

    /* Seal rotation */
    .seal-rotate {
      transform-origin: center center;
      animation: seal-spin var(--ctrl-seal-speed) linear infinite;
    }

    @keyframes seal-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Cracks overlay (drawn on canvas, positioned over seal) */
    .crack-canvas {
      position: absolute;
      inset: -10%;
      width: 120%;
      height: 120%;
      z-index: 6;
      pointer-events: none;
    }

    /* Shatter canvas (fragment physics) */
    .shatter-canvas {
      position: absolute;
      inset: -60%;
      width: 220%;
      height: 220%;
      z-index: 7;
      pointer-events: none;
    }

    /* --- Shockwave CSS --- */
    .shockwave {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 4;
      opacity: 0;
    }

    .shockwave.is-active {
      animation: shockwave-expand 0.8s var(--ease-out-expo) forwards;
    }

    @keyframes shockwave-expand {
      0% {
        width: 0;
        height: 0;
        opacity: calc(var(--ctrl-shockwave) * 1);
        border: 3px solid rgba(201, 169, 78, 0.8);
        box-shadow:
          0 0 20px rgba(201, 169, 78, 0.4),
          inset 0 0 20px rgba(201, 169, 78, 0.2);
      }
      50% {
        opacity: calc(var(--ctrl-shockwave) * 0.5);
      }
      100% {
        width: 350px;
        height: 350px;
        opacity: 0;
        border: 1px solid rgba(201, 169, 78, 0.1);
        box-shadow:
          0 0 40px rgba(201, 169, 78, 0.05),
          inset 0 0 40px rgba(201, 169, 78, 0.02);
      }
    }

    /* Second shockwave ring (delayed) */
    .shockwave--secondary.is-active {
      animation: shockwave-expand-secondary 1s var(--ease-out-expo) 0.1s forwards;
    }

    @keyframes shockwave-expand-secondary {
      0% {
        width: 0;
        height: 0;
        opacity: calc(var(--ctrl-shockwave) * 0.5);
        border: 2px solid rgba(184, 138, 255, 0.6);
        box-shadow: 0 0 15px rgba(184, 138, 255, 0.3);
      }
      100% {
        width: 300px;
        height: 300px;
        opacity: 0;
        border: 1px solid rgba(184, 138, 255, 0.05);
        box-shadow: 0 0 30px rgba(184, 138, 255, 0.02);
      }
    }

    /* --- Begin Reading button --- */
    .begin-btn {
      position: relative;
      z-index: 10;
      padding: 0.85rem 2.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--bg-deep);
      background: linear-gradient(135deg, var(--gold-dim), var(--gold-bright), var(--gold));
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow:
        0 0 20px rgba(201, 169, 78, 0.3),
        0 4px 12px rgba(0, 0, 0, 0.3);
    }

    .begin-btn:hover {
      transform: translateY(-2px);
      box-shadow:
        0 0 30px rgba(201, 169, 78, 0.5),
        0 6px 20px rgba(0, 0, 0, 0.4);
    }

    .begin-btn:active {
      transform: translateY(0);
    }

    .begin-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* --- Ambient particles (background) --- */
    .ambient-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* --- Responsive --- */
    @media (max-width: 640px) {
      .spread-container {
        gap: 1rem;
      }

      .card-wrapper {
        width: 80px;
      }

      .card-slot__label {
        font-size: 0.6rem;
      }

      .card-title {
        font-size: 0.55rem;
        padding: 0.5rem 0.25rem;
      }

      .seal-svg {
        inset: -8%;
        width: 116%;
        height: 116%;
      }

      .begin-btn {
        padding: 0.7rem 1.8rem;
        font-size: 0.75rem;
      }

      .shockwave.is-active {
        animation-name: shockwave-expand-mobile;
      }
    }

    @keyframes shockwave-expand-mobile {
      0% {
        width: 0;
        height: 0;
        opacity: calc(var(--ctrl-shockwave) * 1);
        border: 2px solid rgba(201, 169, 78, 0.8);
        box-shadow: 0 0 15px rgba(201, 169, 78, 0.4);
      }
      100% {
        width: 200px;
        height: 200px;
        opacity: 0;
        border: 1px solid rgba(201, 169, 78, 0.1);
        box-shadow: 0 0 20px rgba(201, 169, 78, 0.02);
      }
    }
  </style>
</head>
<body>
  <div class="mock-page">

    <!-- ============ HEADER ============ -->
    <header class="mock-header">
      <a href="../../index.html" class="mock-back-link">Mock Lab</a>
      <h1 class="mock-title">Sacred Seal Break</h1>
    </header>

    <!-- ============ AMBIENT PARTICLES ============ -->
    <canvas class="ambient-canvas" id="ambientCanvas"></canvas>

    <!-- ============ DEMO AREA ============ -->
    <main class="demo-area">

      <!-- 3-card spread -->
      <div class="spread-container" id="spreadContainer">

        <!-- Card 1: Past -->
        <div class="card-slot">
          <span class="card-slot__label">Past</span>
          <div class="card-wrapper" id="card-0" data-index="0">
            <!-- Revealed card beneath -->
            <div class="oracle-card-inner">
              <div class="card-art card-art--wanderer"></div>
              <div class="card-title">The Wanderer</div>
            </div>
            <!-- Shockwave rings -->
            <div class="shockwave" data-ring="primary"></div>
            <div class="shockwave shockwave--secondary" data-ring="secondary"></div>
            <!-- Crack canvas (drawn during break) -->
            <canvas class="crack-canvas" data-crack></canvas>
            <!-- Shatter canvas (fragment physics) -->
            <canvas class="shatter-canvas" data-shatter></canvas>
            <!-- SVG Seal (positioned over card) -->
            <svg class="seal-svg seal-pulse" data-seal viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <filter id="sealGlow0">
                  <feGaussianBlur stdDeviation="1.5" result="blur"/>
                  <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
              </defs>
              <g class="seal-rotate" filter="url(#sealGlow0)">
                <!-- Seal geometry generated by JS -->
              </g>
            </svg>
          </div>
        </div>

        <!-- Card 2: Present -->
        <div class="card-slot">
          <span class="card-slot__label">Present</span>
          <div class="card-wrapper" id="card-1" data-index="1">
            <div class="oracle-card-inner">
              <div class="card-art card-art--mirror"></div>
              <div class="card-title">The Mirror</div>
            </div>
            <div class="shockwave" data-ring="primary"></div>
            <div class="shockwave shockwave--secondary" data-ring="secondary"></div>
            <canvas class="crack-canvas" data-crack></canvas>
            <canvas class="shatter-canvas" data-shatter></canvas>
            <svg class="seal-svg seal-pulse" data-seal viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <filter id="sealGlow1">
                  <feGaussianBlur stdDeviation="1.5" result="blur"/>
                  <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
              </defs>
              <g class="seal-rotate" filter="url(#sealGlow1)">
              </g>
            </svg>
          </div>
        </div>

        <!-- Card 3: Future -->
        <div class="card-slot">
          <span class="card-slot__label">Future</span>
          <div class="card-wrapper" id="card-2" data-index="2">
            <div class="oracle-card-inner">
              <div class="card-art card-art--flame"></div>
              <div class="card-title">The Flame</div>
            </div>
            <div class="shockwave" data-ring="primary"></div>
            <div class="shockwave shockwave--secondary" data-ring="secondary"></div>
            <canvas class="crack-canvas" data-crack></canvas>
            <canvas class="shatter-canvas" data-shatter></canvas>
            <svg class="seal-svg seal-pulse" data-seal viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <filter id="sealGlow2">
                  <feGaussianBlur stdDeviation="1.5" result="blur"/>
                  <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
              </defs>
              <g class="seal-rotate" filter="url(#sealGlow2)">
              </g>
            </svg>
          </div>
        </div>

      </div>

      <!-- Begin Reading button -->
      <button class="begin-btn" id="beginBtn">Begin Reading</button>

    </main>
  </div>

  <!-- ============ SCRIPTS ============ -->
  <script src="../../shared/controls.js"></script>
  <script>
    /* ============================================
       Sacred Seal Break — Animation Engine
       ============================================ */

    /* --------------------------------------------------
       1. STATE & CONFIG
       -------------------------------------------------- */

    /** Whether the reveal sequence is currently running */
    let isRevealing = false;

    /** Track which cards have been revealed */
    const revealed = [false, false, false];

    /** Read a CSS custom property (set by MockControls) as a number */
    function getCtrl(name) {
      const raw = getComputedStyle(document.documentElement)
        .getPropertyValue('--ctrl-' + name).trim();
      // Strip unit suffixes like 's', 'deg', etc.
      return parseFloat(raw) || 0;
    }

    /** Detect mobile viewport */
    function isMobile() {
      return window.innerWidth <= 640;
    }

    /* --------------------------------------------------
       2. SVG SEAL GENERATION
       -------------------------------------------------- */

    /**
     * Generate sacred geometry SVG paths for a seal.
     * @param {'simple'|'mandala'} style
     * @returns {string} SVG markup (paths + circles + dots)
     */
    function generateSealGeometry(style) {
      const cx = 50, cy = 50;
      let paths = '';

      if (style === 'mandala') {
        /* --- Mandala: complex sacred geometry --- */

        // Outer circle
        paths += `<circle class="seal-path seal-path--outer is-drawing"
          cx="${cx}" cy="${cy}" r="42"
          stroke-dasharray="6 4" />`;

        // Second ring
        paths += `<circle class="seal-path is-drawing"
          cx="${cx}" cy="${cy}" r="36"
          stroke-dasharray="3 5" />`;

        // Inner circle
        paths += `<circle class="seal-path seal-path--inner is-drawing"
          cx="${cx}" cy="${cy}" r="18"
          stroke-dasharray="4 3" />`;

        // Core circle
        paths += `<circle class="seal-path seal-path--inner is-drawing"
          cx="${cx}" cy="${cy}" r="8"
          stroke-dasharray="2 3" />`;

        // Upward triangle (large)
        const triR1 = 32;
        const t1 = [0, 1, 2].map(i => {
          const a = (i * 120 - 90) * Math.PI / 180;
          return `${cx + triR1 * Math.cos(a)},${cy + triR1 * Math.sin(a)}`;
        });
        paths += `<polygon class="seal-path is-drawing"
          points="${t1.join(' ')}"
          stroke-dasharray="8 4" />`;

        // Downward triangle (large)
        const t2 = [0, 1, 2].map(i => {
          const a = (i * 120 + 90) * Math.PI / 180;
          return `${cx + triR1 * Math.cos(a)},${cy + triR1 * Math.sin(a)}`;
        });
        paths += `<polygon class="seal-path is-drawing"
          points="${t2.join(' ')}"
          stroke-dasharray="8 4" />`;

        // Smaller inner hexagram
        const triR2 = 20;
        const t3 = [0, 1, 2].map(i => {
          const a = (i * 120 - 90) * Math.PI / 180;
          return `${cx + triR2 * Math.cos(a)},${cy + triR2 * Math.sin(a)}`;
        });
        paths += `<polygon class="seal-path seal-path--inner is-drawing"
          points="${t3.join(' ')}"
          stroke-dasharray="5 3" />`;

        const t4 = [0, 1, 2].map(i => {
          const a = (i * 120 + 90) * Math.PI / 180;
          return `${cx + triR2 * Math.cos(a)},${cy + triR2 * Math.sin(a)}`;
        });
        paths += `<polygon class="seal-path seal-path--inner is-drawing"
          points="${t4.join(' ')}"
          stroke-dasharray="5 3" />`;

        // Radial lines (12 spokes)
        for (let i = 0; i < 12; i++) {
          const a = (i * 30) * Math.PI / 180;
          const x1 = cx + 10 * Math.cos(a);
          const y1 = cy + 10 * Math.sin(a);
          const x2 = cx + 40 * Math.cos(a);
          const y2 = cy + 40 * Math.sin(a);
          paths += `<line class="seal-path seal-path--inner is-drawing"
            x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"
            stroke-dasharray="3 6" />`;
        }

        // Intersection dots (hexagram vertices)
        for (let i = 0; i < 6; i++) {
          const a = (i * 60 - 90) * Math.PI / 180;
          const dx = cx + triR1 * Math.cos(a);
          const dy = cy + triR1 * Math.sin(a);
          paths += `<circle class="seal-path--dots" cx="${dx}" cy="${dy}" r="1.5" />`;
        }

        // Smaller intersection dots
        for (let i = 0; i < 6; i++) {
          const a = (i * 60 + 30) * Math.PI / 180;
          const dx = cx + 18 * Math.cos(a);
          const dy = cy + 18 * Math.sin(a);
          paths += `<circle class="seal-path--dots" cx="${dx}" cy="${dy}" r="1" />`;
        }

        // Petal arcs between the outer ring vertices
        for (let i = 0; i < 6; i++) {
          const a1 = (i * 60) * Math.PI / 180;
          const a2 = ((i + 1) * 60) * Math.PI / 180;
          const px1 = cx + 36 * Math.cos(a1);
          const py1 = cy + 36 * Math.sin(a1);
          const px2 = cx + 36 * Math.cos(a2);
          const py2 = cy + 36 * Math.sin(a2);
          paths += `<path class="seal-path seal-path--inner is-drawing"
            d="M ${px1} ${py1} Q ${cx} ${cy} ${px2} ${py2}"
            stroke-dasharray="4 4" />`;
        }

      } else {
        /* --- Simple: clean sacred geometry --- */

        // Outer circle
        paths += `<circle class="seal-path seal-path--outer is-drawing"
          cx="${cx}" cy="${cy}" r="40"
          stroke-dasharray="8 5" />`;

        // Inner circle
        paths += `<circle class="seal-path is-drawing"
          cx="${cx}" cy="${cy}" r="28"
          stroke-dasharray="5 4" />`;

        // Core circle
        paths += `<circle class="seal-path seal-path--inner is-drawing"
          cx="${cx}" cy="${cy}" r="12"
          stroke-dasharray="3 4" />`;

        // Upward triangle
        const triR = 30;
        const tri1 = [0, 1, 2].map(i => {
          const a = (i * 120 - 90) * Math.PI / 180;
          return `${cx + triR * Math.cos(a)},${cy + triR * Math.sin(a)}`;
        });
        paths += `<polygon class="seal-path is-drawing"
          points="${tri1.join(' ')}"
          stroke-dasharray="10 5" />`;

        // Downward triangle
        const tri2 = [0, 1, 2].map(i => {
          const a = (i * 120 + 90) * Math.PI / 180;
          return `${cx + triR * Math.cos(a)},${cy + triR * Math.sin(a)}`;
        });
        paths += `<polygon class="seal-path is-drawing"
          points="${tri2.join(' ')}"
          stroke-dasharray="10 5" />`;

        // 6 intersection dots at hexagram vertices
        for (let i = 0; i < 6; i++) {
          const a = (i * 60 - 90) * Math.PI / 180;
          const dx = cx + triR * Math.cos(a);
          const dy = cy + triR * Math.sin(a);
          paths += `<circle class="seal-path--dots" cx="${dx}" cy="${dy}" r="1.8" />`;
        }

        // Center dot
        paths += `<circle class="seal-path--dots" cx="${cx}" cy="${cy}" r="2" />`;
      }

      return paths;
    }

    /** Populate all seal SVGs with geometry */
    function buildSeals() {
      const style = getComputedStyle(document.documentElement)
        .getPropertyValue('--ctrl-seal-style').trim() || 'simple';
      const seals = document.querySelectorAll('[data-seal]');
      seals.forEach((svg, i) => {
        const g = svg.querySelector('.seal-rotate');
        g.innerHTML = generateSealGeometry(style);
      });
    }

    /* --------------------------------------------------
       3. AMBIENT PARTICLE SYSTEM
       -------------------------------------------------- */

    const ambientCanvas = document.getElementById('ambientCanvas');
    const ambientCtx = ambientCanvas.getContext('2d');
    let ambientParticles = [];

    function resizeAmbientCanvas() {
      ambientCanvas.width = window.innerWidth;
      ambientCanvas.height = window.innerHeight;
    }

    function initAmbientParticles() {
      ambientParticles = [];
      const count = isMobile() ? 30 : 60;
      for (let i = 0; i < count; i++) {
        ambientParticles.push({
          x: Math.random() * ambientCanvas.width,
          y: Math.random() * ambientCanvas.height,
          r: Math.random() * 1.5 + 0.3,
          vx: (Math.random() - 0.5) * 0.15,
          vy: (Math.random() - 0.5) * 0.15 - 0.05,
          alpha: Math.random() * 0.4 + 0.1,
          pulse: Math.random() * Math.PI * 2,
          pulseSpeed: Math.random() * 0.02 + 0.005,
        });
      }
    }

    function animateAmbient() {
      ambientCtx.clearRect(0, 0, ambientCanvas.width, ambientCanvas.height);

      ambientParticles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.pulse += p.pulseSpeed;

        // Wrap around
        if (p.x < -5) p.x = ambientCanvas.width + 5;
        if (p.x > ambientCanvas.width + 5) p.x = -5;
        if (p.y < -5) p.y = ambientCanvas.height + 5;
        if (p.y > ambientCanvas.height + 5) p.y = -5;

        const alpha = p.alpha * (0.6 + 0.4 * Math.sin(p.pulse));
        ambientCtx.beginPath();
        ambientCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ambientCtx.fillStyle = `rgba(201, 169, 78, ${alpha})`;
        ambientCtx.fill();

        // Subtle glow
        if (p.r > 1) {
          ambientCtx.beginPath();
          ambientCtx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
          ambientCtx.fillStyle = `rgba(201, 169, 78, ${alpha * 0.15})`;
          ambientCtx.fill();
        }
      });

      requestAnimationFrame(animateAmbient);
    }

    /* --------------------------------------------------
       4. CRACK DRAWING
       -------------------------------------------------- */

    /**
     * Draw fracture cracks on the given canvas.
     * @param {HTMLCanvasElement} canvas
     * @param {'radial'|'lightning'} pattern
     * @param {Function} onComplete — called when done drawing
     */
    function drawCracks(canvas, pattern, onComplete) {
      const ctx = canvas.getContext('2d');
      const w = canvas.width = canvas.offsetWidth * 2;
      const h = canvas.height = canvas.offsetHeight * 2;
      ctx.scale(2, 2); // HiDPI
      const cw = canvas.offsetWidth;
      const ch = canvas.offsetHeight;
      const cx = cw / 2;
      const cy = ch / 2;

      const cracks = [];
      const numCracks = pattern === 'radial' ? 8 : 5;

      // Generate crack paths
      for (let i = 0; i < numCracks; i++) {
        const points = [{ x: cx, y: cy }];
        let angle;

        if (pattern === 'radial') {
          angle = (i / numCracks) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
        } else {
          // Lightning: more random angles from center
          angle = Math.random() * Math.PI * 2;
        }

        const segments = pattern === 'lightning' ? 10 : 6;
        const segLen = (Math.min(cw, ch) * 0.45) / segments;

        for (let s = 0; s < segments; s++) {
          const prev = points[points.length - 1];
          // Lightning gets more deviation
          const deviation = pattern === 'lightning'
            ? (Math.random() - 0.5) * 1.2
            : (Math.random() - 0.5) * 0.4;
          angle += deviation;
          const len = segLen * (0.7 + Math.random() * 0.6);
          points.push({
            x: prev.x + Math.cos(angle) * len,
            y: prev.y + Math.sin(angle) * len,
          });
        }
        cracks.push(points);
      }

      // Animate cracks drawing progressively
      let progress = 0;
      const totalFrames = 20;

      function drawFrame() {
        ctx.clearRect(0, 0, cw, ch);
        progress++;
        const t = Math.min(progress / totalFrames, 1);

        cracks.forEach(crack => {
          const drawUpTo = Math.floor(t * (crack.length - 1));
          if (drawUpTo < 1) return;

          // Glow layer
          ctx.beginPath();
          ctx.moveTo(crack[0].x, crack[0].y);
          for (let j = 1; j <= drawUpTo; j++) {
            ctx.lineTo(crack[j].x, crack[j].y);
          }
          // Partial segment
          if (drawUpTo < crack.length - 1) {
            const frac = (t * (crack.length - 1)) - drawUpTo;
            const from = crack[drawUpTo];
            const to = crack[drawUpTo + 1];
            ctx.lineTo(
              from.x + (to.x - from.x) * frac,
              from.y + (to.y - from.y) * frac
            );
          }
          ctx.strokeStyle = 'rgba(226, 201, 106, 0.6)';
          ctx.lineWidth = 4;
          ctx.shadowColor = 'rgba(201, 169, 78, 0.8)';
          ctx.shadowBlur = 12;
          ctx.stroke();

          // Core bright line
          ctx.beginPath();
          ctx.moveTo(crack[0].x, crack[0].y);
          for (let j = 1; j <= drawUpTo; j++) {
            ctx.lineTo(crack[j].x, crack[j].y);
          }
          if (drawUpTo < crack.length - 1) {
            const frac = (t * (crack.length - 1)) - drawUpTo;
            const from = crack[drawUpTo];
            const to = crack[drawUpTo + 1];
            ctx.lineTo(
              from.x + (to.x - from.x) * frac,
              from.y + (to.y - from.y) * frac
            );
          }
          ctx.strokeStyle = 'rgba(255, 255, 240, 0.9)';
          ctx.lineWidth = 1.5;
          ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
          ctx.shadowBlur = 4;
          ctx.stroke();
        });

        ctx.shadowBlur = 0;

        if (progress < totalFrames) {
          requestAnimationFrame(drawFrame);
        } else {
          if (onComplete) onComplete();
        }
      }

      requestAnimationFrame(drawFrame);
    }

    /* --------------------------------------------------
       5. FRAGMENT GENERATION (Voronoi-like subdivision)
       -------------------------------------------------- */

    /**
     * Generate random polygon fragments from a circular seal area.
     * Uses random point placement + triangulation-like subdivision.
     * @param {number} cx - center X
     * @param {number} cy - center Y
     * @param {number} radius - seal radius
     * @param {number} count - number of fragments
     * @returns {Array<{points: Array<{x,y}>, cx: number, cy: number}>}
     */
    function generateFragments(cx, cy, radius, count) {
      const fragments = [];

      // Generate seed points inside the circle
      const seeds = [];
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.sqrt(Math.random()) * radius;
        seeds.push({
          x: cx + Math.cos(a) * r,
          y: cy + Math.sin(a) * r,
        });
      }

      // Create polygon fragments around each seed
      // Simplified approach: create small irregular polygons
      seeds.forEach(seed => {
        const numVerts = 3 + Math.floor(Math.random() * 3); // 3-5 vertices
        const size = radius * (0.08 + Math.random() * 0.12);
        const baseAngle = Math.random() * Math.PI * 2;
        const points = [];

        for (let v = 0; v < numVerts; v++) {
          const a = baseAngle + (v / numVerts) * Math.PI * 2;
          const r = size * (0.6 + Math.random() * 0.8);
          points.push({
            x: seed.x + Math.cos(a) * r,
            y: seed.y + Math.sin(a) * r,
          });
        }

        fragments.push({
          points,
          cx: seed.x,
          cy: seed.y,
        });
      });

      return fragments;
    }

    /* --------------------------------------------------
       6. SHATTER PHYSICS ANIMATION
       -------------------------------------------------- */

    /**
     * Animate shattering fragments flying outward with physics.
     * @param {HTMLCanvasElement} canvas
     * @param {Array} fragments - from generateFragments
     * @param {number} centerX - center of explosion in canvas coords
     * @param {number} centerY
     * @param {number} force - shatter force multiplier
     * @param {number} dustFade - duration for dust fade in seconds
     */
    function animateShatter(canvas, fragments, centerX, centerY, force, dustFade) {
      const ctx = canvas.getContext('2d');
      const w = canvas.width = canvas.offsetWidth * 2;
      const h = canvas.height = canvas.offsetHeight * 2;
      ctx.scale(2, 2);
      const cw = canvas.offsetWidth;
      const ch = canvas.offsetHeight;

      // Initialize physics for each fragment
      const particles = fragments.map(frag => {
        // Direction: outward from center
        const dx = frag.cx - centerX;
        const dy = frag.cy - centerY;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const speed = (force * 0.6 + Math.random() * force * 0.8);

        return {
          points: frag.points.map(p => ({ ...p })),
          cx: frag.cx,
          cy: frag.cy,
          vx: (dx / dist) * speed + (Math.random() - 0.5) * force * 0.3,
          vy: (dy / dist) * speed + (Math.random() - 0.5) * force * 0.3 - force * 0.2,
          rotation: 0,
          angularVel: (Math.random() - 0.5) * 0.15 * force,
          alpha: 1,
          scale: 1,
          fadeRate: 1 / (dustFade * 60), // fade over dustFade seconds at 60fps
        };
      });

      const gravity = 0.12;
      let frame = 0;
      const maxFrames = Math.ceil(dustFade * 60) + 30;

      function drawShatter() {
        ctx.clearRect(0, 0, cw, ch);
        frame++;

        let anyAlive = false;

        particles.forEach(p => {
          if (p.alpha <= 0) return;
          anyAlive = true;

          // Physics update
          p.vy += gravity;
          p.cx += p.vx;
          p.cy += p.vy;
          p.rotation += p.angularVel;
          p.alpha -= p.fadeRate;
          p.scale *= 0.995;

          // Slow down
          p.vx *= 0.985;
          p.vy *= 0.985;

          if (p.alpha <= 0) { p.alpha = 0; return; }

          ctx.save();
          ctx.globalAlpha = Math.max(0, p.alpha);
          ctx.translate(p.cx, p.cy);
          ctx.rotate(p.rotation);
          ctx.scale(p.scale, p.scale);

          // Draw fragment polygon
          ctx.beginPath();
          const pts = p.points;
          ctx.moveTo(pts[0].x - p.points[0].x + (pts[0].x - p.cx) * 0.1,
                     pts[0].y - p.points[0].y + (pts[0].y - p.cy) * 0.1);
          // Simplified: draw relative to (0,0)
          ctx.moveTo(0, 0);
          for (let i = 0; i < pts.length; i++) {
            ctx.lineTo(
              (pts[i].x - p.cx) * p.scale,
              (pts[i].y - p.cy) * p.scale
            );
          }
          ctx.closePath();

          // Gold fill with glow
          ctx.fillStyle = `rgba(201, 169, 78, ${p.alpha * 0.8})`;
          ctx.shadowColor = `rgba(226, 201, 106, ${p.alpha * 0.5})`;
          ctx.shadowBlur = 6;
          ctx.fill();

          // Edge highlight
          ctx.strokeStyle = `rgba(226, 201, 106, ${p.alpha * 0.6})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();

          ctx.restore();
        });

        // Draw trailing dust particles
        if (frame > 10) {
          particles.forEach(p => {
            if (p.alpha <= 0.1) return;
            // Spawn tiny dust
            const dustAlpha = p.alpha * 0.3;
            ctx.beginPath();
            ctx.arc(
              p.cx + (Math.random() - 0.5) * 8,
              p.cy + (Math.random() - 0.5) * 8,
              Math.random() * 1.5,
              0, Math.PI * 2
            );
            ctx.fillStyle = `rgba(201, 169, 78, ${dustAlpha})`;
            ctx.fill();
          });
        }

        if (anyAlive && frame < maxFrames) {
          requestAnimationFrame(drawShatter);
        } else {
          // Clean up
          ctx.clearRect(0, 0, cw, ch);
        }
      }

      requestAnimationFrame(drawShatter);
    }

    /* --------------------------------------------------
       7. CARD REVEAL SEQUENCE
       -------------------------------------------------- */

    /**
     * Reveal a single card: cracks -> shatter -> shockwave -> card appears
     * @param {number} index - card index (0, 1, 2)
     * @returns {Promise} resolves when reveal animation completes
     */
    function revealCard(index) {
      return new Promise(resolve => {
        const wrapper = document.getElementById(`card-${index}`);
        const sealSvg = wrapper.querySelector('[data-seal]');
        const crackCanvas = wrapper.querySelector('[data-crack]');
        const shatterCanvas = wrapper.querySelector('[data-shatter]');
        const cardInner = wrapper.querySelector('.oracle-card-inner');
        const primaryRing = wrapper.querySelector('[data-ring="primary"]');
        const secondaryRing = wrapper.querySelector('[data-ring="secondary"]');

        const crackPattern = getComputedStyle(document.documentElement)
          .getPropertyValue('--ctrl-crack-pattern').trim() || 'radial';
        const shatterForce = getCtrl('shatter-force');
        const fragmentCount = Math.round(getCtrl('fragments'));
        const dustFade = getCtrl('dust-fade');

        // Use fewer fragments on mobile
        const finalFragments = isMobile()
          ? Math.max(8, Math.round(fragmentCount * 0.5))
          : fragmentCount;

        // Phase 1: Intensify seal glow (energy buildup)
        sealSvg.style.transition = 'filter 0.5s ease';
        sealSvg.style.filter = `
          drop-shadow(0 0 12px rgba(201, 169, 78, 0.8))
          drop-shadow(0 0 24px rgba(226, 201, 106, 0.5))
        `;

        // Phase 2: Draw cracks (after brief buildup)
        setTimeout(() => {
          drawCracks(crackCanvas, crackPattern, () => {
            // Phase 3: Shatter!
            const sealRect = sealSvg.getBoundingClientRect();
            const wrapperRect = shatterCanvas.getBoundingClientRect();

            // Calculate center of the shatter canvas
            const sCw = shatterCanvas.offsetWidth;
            const sCh = shatterCanvas.offsetHeight;
            const canvasCx = sCw / 2;
            const canvasCy = sCh / 2;

            // Generate fragments centered on the seal
            const sealRadius = Math.min(sCw, sCh) * 0.3;
            const fragments = generateFragments(canvasCx, canvasCy, sealRadius, finalFragments);

            // Hide SVG seal
            sealSvg.classList.add('is-shattered');

            // Clear cracks
            const crackCtx = crackCanvas.getContext('2d');
            crackCtx.clearRect(0, 0, crackCanvas.width, crackCanvas.height);

            // Flash effect
            cardInner.style.boxShadow = '0 0 40px rgba(226, 201, 106, 0.8)';
            setTimeout(() => {
              cardInner.style.boxShadow = '';
            }, 300);

            // Trigger shockwave
            primaryRing.classList.add('is-active');
            secondaryRing.classList.add('is-active');

            // Reveal card
            cardInner.classList.add('is-revealed');

            // Animate shatter fragments
            animateShatter(shatterCanvas, fragments, canvasCx, canvasCy, shatterForce, dustFade);

            revealed[index] = true;

            // Resolve after the main animation is visually complete
            setTimeout(resolve, 600);
          });
        }, 400);
      });
    }

    /**
     * Run the full sequenced reveal for all 3 cards.
     */
    async function beginReading() {
      if (isRevealing) return;
      isRevealing = true;

      const btn = document.getElementById('beginBtn');
      btn.disabled = true;
      btn.textContent = 'Revealing...';

      const delay = getCtrl('delay') * 1000;

      for (let i = 0; i < 3; i++) {
        if (revealed[i]) continue;
        await revealCard(i);
        // Wait between cards (except after the last)
        if (i < 2) {
          await new Promise(r => setTimeout(r, delay));
        }
      }

      btn.textContent = 'Reset';
      btn.disabled = false;
      isRevealing = false;

      // Change button to reset behavior
      btn.onclick = resetReading;
    }

    /**
     * Reset all cards back to sealed state.
     */
    function resetReading() {
      revealed.fill(false);

      for (let i = 0; i < 3; i++) {
        const wrapper = document.getElementById(`card-${i}`);
        const sealSvg = wrapper.querySelector('[data-seal]');
        const cardInner = wrapper.querySelector('.oracle-card-inner');
        const primaryRing = wrapper.querySelector('[data-ring="primary"]');
        const secondaryRing = wrapper.querySelector('[data-ring="secondary"]');
        const crackCanvas = wrapper.querySelector('[data-crack]');
        const shatterCanvas = wrapper.querySelector('[data-shatter]');

        // Reset seal
        sealSvg.classList.remove('is-shattered');
        sealSvg.style.filter = '';
        sealSvg.style.transition = '';

        // Reset card
        cardInner.classList.remove('is-revealed');
        cardInner.style.boxShadow = '';

        // Reset shockwaves
        primaryRing.classList.remove('is-active');
        secondaryRing.classList.remove('is-active');

        // Clear canvases
        const crackCtx = crackCanvas.getContext('2d');
        crackCtx.clearRect(0, 0, crackCanvas.width, crackCanvas.height);
        const shatterCtx = shatterCanvas.getContext('2d');
        shatterCtx.clearRect(0, 0, shatterCanvas.width, shatterCanvas.height);
      }

      // Rebuild seals (in case style changed)
      buildSeals();

      const btn = document.getElementById('beginBtn');
      btn.textContent = 'Begin Reading';
      btn.onclick = beginReading;
    }

    /* --------------------------------------------------
       8. MOCK CONTROLS
       -------------------------------------------------- */

    const controls = new MockControls('Sacred Seal Break');

    controls.addSegmented('seal-style', 'Seal Complexity', [
      { label: 'Simple', value: 'simple' },
      { label: 'Mandala', value: 'mandala' },
    ], (value) => {
      // Rebuild seals when style changes (only if not mid-reveal)
      if (!isRevealing) {
        buildSeals();
      }
    });

    controls.addSegmented('crack-pattern', 'Crack Pattern', [
      { label: 'Radial', value: 'radial' },
      { label: 'Lightning', value: 'lightning' },
    ]);

    controls.addSlider('shatter-force', 'Shatter Force', {
      min: 1, max: 10, step: 1, default: 5
    });

    controls.addSlider('fragments', 'Fragment Count', {
      min: 10, max: 50, step: 5, default: 25
    });

    controls.addSlider('shockwave', 'Shockwave Intensity', {
      min: 0, max: 1, step: 0.1, default: 0.7
    });

    controls.addSlider('seal-speed', 'Seal Rotation', {
      min: 5, max: 30, step: 5, default: 15, unit: 's'
    });

    controls.addSlider('dust-fade', 'Dust Fade', {
      min: 0.5, max: 3, step: 0.25, default: 1.5, unit: 's'
    });

    controls.addSlider('delay', 'Card Delay', {
      min: 0.5, max: 3, step: 0.25, default: 1.5, unit: 's'
    });

    controls.render();

    /* --------------------------------------------------
       9. INITIALIZATION
       -------------------------------------------------- */

    function init() {
      // Size ambient canvas
      resizeAmbientCanvas();
      window.addEventListener('resize', () => {
        resizeAmbientCanvas();
        initAmbientParticles();
      });

      // Start ambient particles
      initAmbientParticles();
      animateAmbient();

      // Build initial seals
      buildSeals();

      // Button handler
      document.getElementById('beginBtn').onclick = beginReading;
    }

    // Wait for DOM + styles to be ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
